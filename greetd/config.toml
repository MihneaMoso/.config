[terminal]
# The VT to run the greeter on. 1 is standard.
vt = 1

[default_session]
# Replace 'Hyprland' with the full path if you want to be 100% safe
# command = "tuigreet --time --asterisks --remember --cmd Hyprland"
command = "tuigreet --time --asterisks --remember --cmd 'dbus-run-session Hyprland'"

# The user to run the greeter as
user = "greeter"
