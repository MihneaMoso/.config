<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Set default sans-serif, serif, and monospace fonts -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>JetBrains Mono Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer><family>JetBrains Mono Nerd Font</family></prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer><family>JetBrains Mono Nerd Font</family></prefer>
  </alias>
</fontconfig>
